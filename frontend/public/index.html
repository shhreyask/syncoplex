<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syncoplex</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-view="landing">

  <!-- ── Landing ──────────────────────────────────────────────── -->
  <section id="view-landing">
    <div class="landing-box">
      <h1 class="wordmark">SYNCOPLEX</h1>
      <p class="tagline">Watch together. In sync.</p>

      <button id="btn-create" class="btn btn-primary">Create Room</button>

      <div class="divider"><span>or join one</span></div>

      <div class="join-row">
        <input
          id="input-join-code"
          class="input"
          type="text"
          placeholder="WOLF-BEAR-482134"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="btn-join" class="btn btn-secondary">Join</button>
      </div>

      <p id="landing-error" class="inline-error" hidden></p>
    </div>
  </section>

  <!-- ── Lobby ────────────────────────────────────────────────── -->
  <section id="view-lobby">
    <div class="lobby-box">

      <div class="lobby-header">
        <span class="label">Room</span>
        <span id="lobby-room-code" class="room-code">—</span>
        <button id="btn-copy-code" class="btn-icon" title="Copy room code">⎘</button>
      </div>

      <div class="name-row">
        <input
          id="input-name"
          class="input"
          type="text"
          placeholder="Your display name"
          maxlength="32"
          autocomplete="off"
        />
        <button id="btn-set-name" class="btn btn-primary">Set Name</button>
      </div>

      <p id="lobby-error" class="inline-error" hidden></p>

      <div class="ws-status-bar">
        <span id="ws-status-indicator" class="status-dot status-disconnected"></span>
        <span id="ws-status-label">Disconnected</span>
      </div>

      <div class="members-panel">
        <span class="label">In room</span>
        <ul id="members-list" class="members-list"></ul>
      </div>

      <p class="lobby-hint">Once everyone is here, pick a file and start watching.</p>

      <!-- Fingerprint feedback — shown above the button, hidden until a file is chosen -->
      <div id="fileVerify-spinner" class="fileVerify-pending" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span>Checking your file…</span>
      </div>
      <p id="fileVerify-error" class="inline-error" hidden></p>

      <!-- Appears only when connected — same as original Pick File & Watch -->
      <button id="btn-pick-file" class="btn btn-primary" hidden>Pick File &amp; Watch</button>

      <button id="btn-leave-lobby" class="btn btn-ghost">← Leave</button>
    </div>
  </section>

  <!-- ── Watch ─────────────────────────────────────────────────── -->
  <section id="view-watch">

    <div id="file-picker-overlay">
      <div class="picker-box">
        <p class="picker-title">Select your local copy of the movie</p>
        <p class="picker-hint">MP4 recommended. MKV support varies by browser.</p>
        <label class="btn btn-primary" for="input-file">Choose File</label>
        <input id="input-file" type="file" accept=".mp4,.mkv,.avi,.mov" hidden />
        <p id="file-error" class="inline-error" hidden></p>
      </div>
    </div>

    <video id="main-video" playsinline crossorigin="anonymous" tabindex="-1">
      <track id="subtitle-track" kind="subtitles" default />
    </video>

    <div id="controls-bar">
      <button id="btn-play-pause" class="ctrl-btn">▶</button>
      <span   id="time-current"   class="time-label">0:00</span>
      <input  id="seek-bar"       class="seek-bar" type="range" min="0" max="100" value="0" step="0.01" />
      <span   id="time-total"     class="time-label">0:00</span>
      <input  id="volume-slider"  class="volume-slider" type="range" min="0" max="1" step="0.05" value="1" />
      <button id="btn-mute"       class="ctrl-btn">🔊</button>
      <button id="btn-cc"         class="ctrl-btn" title="Load subtitles">CC</button>
      <button id="btn-fullscreen" class="ctrl-btn" title="Fullscreen">⛶</button>
      <input  id="input-subtitle" type="file" accept=".vtt,.srt" hidden />
    </div>

  </section>

  <!-- JS — order matters: state → ws → player → sync → fileVerify → ui -->
  <!-- workerFileVerify.js is NOT listed here — loaded only via new Worker() -->
  <script src="/js/state.js"></script>
  <script src="/js/ws.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/sync.js"></script>
  <script src="/js/fileVerify.js"></script>
  <script src="/js/ui.js"></script>
</body>
</html>
